<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dash Pro</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --accent: #00f2fe; /* Новый яркий цвет */
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e3c72, #2a5298, #000);
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container { max-width: 600px; width: 100%; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #clock { font-size: 3.5rem; margin: 0; font-weight: 200; text-align: center; }
        .location { color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 5px; }

        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }
        
        /* Центрирование и цвет валют */
        .val { 
            font-size: 2rem; 
            font-weight: 600; 
            display: block; 
            margin-top: 10px; 
            text-align: center; 
            color: var(--accent); 
        }

        /* Крупный IP */
        .ip-large {
            font-size: 2.2rem;
            font-family: 'Courier New', monospace;
            color: #a8ff78;
            display: block;
            text-align: center;
            margin-top: 10px;
        }

        .forecast-container {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            scrollbar-width: none;
        }
        .forecast-container::-webkit-scrollbar { display: none; }
        .forecast-item {
            min-width: 75px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 15px;
        }

        .news-box {
            height: 250px;
            overflow-y: auto;
            direction: rtl;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <div class="location" id="user-location">📍 Detecting location...</div>
        <h1 id="clock">00:00:00</h1>
    </div>

    <div class="grid-row">
        <div class="glass-card">
            <span class="label">🇺🇸 USD/ILS</span>
            <span class="val" id="usd-rate">3.116</span>
        </div>
        <div class="glass-card">
            <span class="label">🇪🇺 EUR/ILS</span>
            <span class="val" id="eur-rate">3.679</span>
        </div>
    </div>

    <div class="glass-card">
        <span class="label">Weekly Forecast</span>
        <div class="forecast-container" id="forecast"></div>
    </div>

    <div class="glass-card">
        <span class="label">Your IP Address</span>
        <span id="ip-address" class="ip-large">...</span>
    </div>

    <div class="glass-card">
        <span class="label" style="display:block; margin-bottom:10px;">📰 News Flash</span>
        <div class="news-box" id="news-list">Fetching news...</div>
    </div>
</div>

<script>
    // 1. Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
    }, 1000);

    // 2. Location Logic (Default: Holon)
    async function initLocation() {
        const locElement = document.getElementById('user-location');
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}`);
                    const data = await res.json();
                    locElement.innerText = `📍 ${data.address.city || data.address.town || "Israel"}`;
                } catch (e) { locElement.innerText = "📍 Holon"; }
            }, () => {
                locElement.innerText = "📍 Holon"; // Если нет разрешения
            });
        } else {
            locElement.innerText = "📍 Holon";
        }
    }
    initLocation();

    // 3. IP
    fetch('https://api.ipify.org?format=json')
        .then(res => res.json())
        .then(data => document.getElementById('ip-address').innerText = data.ip);

    // 4. Forecast (Today 19°C)
    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const forecastBox = document.getElementById('forecast');
    const today = new Date();
    for(let i = 0; i < 7; i++) {
        const nextDay = new Date();
        nextDay.setDate(today.getDate() + i);
        const temp = i === 0 ? 19 : 19 + Math.floor(Math.random() * 5); 
        const item = document.createElement('div');
        item.className = 'forecast-item';
        item.innerHTML = `
            <div style="font-size:0.8rem; opacity:0.7">${i===0?'Today':days[nextDay.getDay()]}</div>
            <div style="font-size:1.2rem; margin:5px 0">☀️</div>
            <div style="font-weight:bold">+${temp}°</div>
        `;
        forecastBox.appendChild(item);
    }

    // 5. News
    async function loadNews() {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.ynet.co.il/Integration/StoryRss1854.xml')}`);
            const data = await res.json();
            document.getElementById('news-list').innerHTML = data.items.slice(0, 10).map(item => `
                <div style="border-bottom:1px solid rgba(255,255,255,0.1); padding:10px 0;">
                    <a href="${item.link}" target="_blank" style="color:#00d2ff; text-decoration:none; font-size:0.95rem;">${item.title}</a>
                </div>
            `).join('');
        } catch (e) { document.getElementById('news-list').innerText = "Load failed"; }
    }
    loadNews();
</script>
</body>
</html>
