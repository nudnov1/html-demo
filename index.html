<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dash | Pro + News</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #00d2ff;
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e3c72, #2a5298, #000);
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 600px; width: 100%; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Шапка */
        #clock { font-size: 3.5rem; margin: 0; font-weight: 200; text-align: center; }
        .location { color: var(--accent); font-weight: bold; margin-bottom: 5px; text-align: center; }

        /* Сетка валют */
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }
        .val { font-size: 1.5rem; font-weight: 600; display: block; margin-top: 5px; }

        /* Окно НОВОСТЕЙ (Ynet) */
        .news-frame-container {
            height: 450px;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: white; /* Светлый фон для удобства чтения иврита */
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #up-btn {
            position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px;
            border-radius: 50%; background: var(--accent); border: none; font-weight: bold;
            cursor: pointer; display: none; box-shadow: 0 5px 15px rgba(0,210,255,0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <div class="location">📍 <span id="city">Израиль, Холон</span></div>
        <h1 id="clock">00:00:00</h1>
    </div>

    <div class="grid-row">
        <div class="glass-card">
            <span class="label">🇺🇸 USD/ILS</span>
            <span class="val">3.128</span>
        </div>
        <div class="glass-card">
            <span class="label">🇪🇺 EUR/ILS</span>
            <span class="val">3.679</span>
        </div>
    </div>

    <div class="glass-card" style="padding: 12px 20px;">
        <span class="label">Ваш IP Адрес:</span>
        <span id="ip-address" style="float: right; font-family: monospace; color: #a8ff78;">Загрузка...</span>
    </div>

<div class="glass-card">
    <span class="label" style="display: block; margin-bottom: 10px;">📰 מבזקים (Ynet RSS)</span>
    <div class="news-frame-container" style="background: rgba(255,255,255,0.05); height: 350px; overflow-y: auto; padding: 10px; direction: rtl;">
        <div id="news-list" style="font-size: 0.9rem; text-align: right;">
            Загрузка новостей...
        </div>
    </div>
</div>

<script>
    // Добавьте эту функцию в раздел <script>
    async function loadYnetNews() {
        const rssUrl = 'https://www.ynet.co.il/Integration/StoryRss1854.xml';
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
        
        try {
            const response = await fetch(apiUrl);
            const data = await response.json();
            const container = document.getElementById('news-list');
            container.innerHTML = '';
            
            data.items.slice(0, 10).forEach(item => {
                const newsItem = document.createElement('div');
                newsItem.style.borderBottom = '1px solid rgba(255,255,255,0.1)';
                newsItem.style.padding = '8px 0';
                newsItem.innerHTML = `
                    <a href="${item.link}" target="_blank" style="color: #00d2ff; text-decoration: none; font-weight: bold;">
                        ${item.title}
                    </a>
                    <div style="font-size: 0.75rem; opacity: 0.6; margin-top: 3px;">${new Date(item.pubDate).toLocaleTimeString('he-IL')}</div>
                `;
                container.appendChild(newsItem);
            });
        } catch (e) {
            document.getElementById('news-list').innerText = "Не удалось загрузить новости";
        }
    }
    loadYnetNews();
    setInterval(loadYnetNews, 300000); // Обновлять каждые 5 минут
</script>
</div>

<button id="up-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">UP</button>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('ru-RU');
    }
    setInterval(updateTime, 1000);
    updateTime();

    async function getIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            document.getElementById('ip-address').innerText = data.ip;
        } catch(e) { document.getElementById('ip-address').innerText = "Ошибка"; }
    }
    getIP();

    window.onscroll = () => {
        document.getElementById('up-btn').style.display = window.scrollY > 200 ? 'block' : 'none';
    };
</script>

</body>
</html>
