<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dash Pro</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --accent: #00d2ff;
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e3c72, #2a5298, #000);
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container { max-width: 600px; width: 100%; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #clock { font-size: 3.5rem; margin: 0; font-weight: 200; text-align: center; }
        .location { color: var(--accent); font-weight: bold; text-align: center; margin-bottom: 5px; min-height: 1.2em; }

        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }
        .val { font-size: 1.5rem; font-weight: 600; display: block; margin-top: 5px; }

        /* WEATHER FORECAST */
        .forecast-container {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        .forecast-container::-webkit-scrollbar { display: none; }
        .forecast-item {
            min-width: 75px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 15px;
        }

        /* NEWS BOX */
        .news-box {
            height: 300px;
            overflow-y: auto;
            direction: rtl;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }

        #up-btn {
            position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px;
            border-radius: 50%; background: var(--accent); border: none; font-weight: bold;
            cursor: pointer; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <div class="location" id="user-location">📍 Detecting location...</div>
        <h1 id="clock">00:00:00</h1>
    </div>

    <div class="grid-row">
        <div class="glass-card">
            <span class="label">🇺🇸 USD/ILS</span>
            <span class="val" id="usd-rate">3.115</span>
        </div>
        <div class="glass-card">
            <span class="label">🇪🇺 EUR/ILS</span>
            <span class="val" id="eur-rate">3.679</span>
        </div>
    </div>

    <div class="glass-card">
        <span class="label">Weekly Forecast</span>
        <div class="forecast-container" id="forecast"></div>
    </div>

    <div class="glass-card" style="padding: 12px 20px;">
        <span class="label">Your IP:</span>
        <span id="ip-address" style="float: right; font-family: monospace; color: #a8ff78;">Loading...</span>
    </div>

    <div class="glass-card">
        <span class="label" style="display:block; margin-bottom:10px;">📰 News Flash (Ynet RSS)</span>
        <div class="news-box" id="news-list">Fetching news...</div>
    </div>
</div>

<button id="up-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">UP</button>

<script>
    // 1. Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
    }, 1000);

    // 2. Real-time Location Detection
    async function initLocation() {
        const locElement = document.getElementById('user-location');
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const data = await res.json();
                    const city = data.address.city || data.address.town || data.address.village || "Israel";
                    locElement.innerText = `📍 ${city}`;
                } catch (e) { locElement.innerText = "📍 Israel"; }
            }, () => {
                locElement.innerText = "📍 Holon (Default)";
            });
        }
    }
    initLocation();

    // 3. Network Info (IP)
    fetch('https://api.ipify.org?format=json')
        .then(res => res.json())
        .then(data => document.getElementById('ip-address').innerText = data.ip)
        .catch(() => document.getElementById('ip-address').innerText = "Hidden");

    // 4. Weather Simulation (Using current date data)
    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const forecastBox = document.getElementById('forecast');
    const today = new Date();
    // Today's weather in Holon is 19°C.
    for(let i = 0; i < 7; i++) {
        const nextDay = new Date();
        nextDay.setDate(today.getDate() + i);
        const temp = i === 0 ? 19 : 19 + Math.floor(Math.random() * 5); 
        const item = document.createElement('div');
        item.className = 'forecast-item';
        item.innerHTML = `
            <div style="font-size:0.8rem; opacity:0.7">${i===0?'Today':days[nextDay.getDay()]}</div>
            <div style="font-size:1.2rem; margin:5px 0">☀️</div>
            <div style="font-weight:bold">+${temp}°</div>
        `;
        forecastBox.appendChild(item);
    }

    // 5. Ynet News Feed (RSS to JSON)
    async function loadNews() {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.ynet.co.il/Integration/StoryRss1854.xml')}`);
            const data = await res.json();
            const container = document.getElementById('news-list');
            container.innerHTML = data.items.slice(0, 10).map(item => `
                <div style="border-bottom:1px solid rgba(255,255,255,0.1); padding:10px 0;">
                    <a href="${item.link}" target="_blank" style="color:#00d2ff; text-decoration:none; font-size:0.95rem;">${item.title}</a>
                </div>
            `).join('');
        } catch (e) { document.getElementById('news-list').innerText = "Failed to load news"; }
    }
    loadNews();

    // 6. Scroll Logic
    window.onscroll = () => {
        document.getElementById('up-btn').style.display = window.scrollY > 200 ? 'block' : 'none';
    };
</script>
</body>
</html>
