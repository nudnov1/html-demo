<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dash | Israel & Network</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
            --accent: #00f2fe;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .glass-card:hover { transform: translateY(-5px); }

        h1#clock { font-size: 3.8rem; margin: 0; font-weight: 300; }
        .date { opacity: 0.7; margin-bottom: 5px; font-size: 1.1rem; }

        .currency-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .rate-val { font-size: 1.8rem; font-weight: 600; display: block; margin-top: 8px; color: var(--accent); }

        .info-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }

        /* Новый блок IP */
        .ip-box { border: 1px solid rgba(0, 242, 254, 0.3); }
        #ip-address { font-family: monospace; font-size: 1.4rem; color: #a8ff78; margin-top: 5px; display: block; }

        #up-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--accent);
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.4);
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-card">
        <div class="date" id="date">Загрузка даты...</div>
        <h1 id="clock">00:00</h1>
    </div>

    <div class="currency-grid">
        <div class="glass-card">
            <span class="info-label">🇺🇸 USD/ILS</span>
            <span class="rate-val">3.12</span>
        </div>
        <div class="glass-card">
            <span class="info-label">🇪🇺 EUR/ILS</span>
            <span class="rate-val">3.67</span>
        </div>
    </div>

    <div class="glass-card">
        <span class="info-label">Погода сегодня</span>
        <div style="font-size: 1.6rem; margin-top: 10px;">☀️ +22°C (Ясно)</div>
    </div>

    <div class="glass-card ip-box">
        <span class="info-label">Ваш IP адрес</span>
        <span id="ip-address">Определяем...</span>
    </div>
    
    <div style="height: 400px; opacity: 0.3; padding-top: 50px;">
        Меню настроек (скоро)
    </div>
</div>

<button id="up-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">UP</button>

<script>
    // 1. Время и дата
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('date').innerText = now.toLocaleDateString('ru-RU', options);
    }
    setInterval(updateTime, 1000);
    updateTime();

    // 2. Получение IP адреса
    async function getIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            document.getElementById('ip-address').innerText = data.ip;
        } catch (error) {
            document.getElementById('ip-address').innerText = "Ошибка сети";
        }
    }
    getIP();

    // 3. Кнопка UP
    window.onscroll = function() {
        const btn = document.getElementById('up-btn');
        btn.style.display = window.scrollY > 200 ? 'block' : 'none';
    };
</script>

</body>
</html>
